name: Tip Release

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  TIP_TAG: tip
  TIP_RELEASE_NAME: Tip

jobs:
  build:
    name: Build Linux tip
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@v6

      - name: Require dev branch
        if: ${{ github.ref_name != 'dev' }}
        shell: bash
        run: |
          echo "Tip Release only publishes builds from dev. Current ref: ${GITHUB_REF_NAME}" >&2
          exit 1

      - name: Install Linux build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev libubsan1

      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          targets: x86_64-unknown-linux-musl

      - name: Build codex
        shell: bash
        run: cargo build --release --bin codex --target x86_64-unknown-linux-musl

      - name: Stage artifact
        shell: bash
        run: |
          set -euo pipefail
          output_dir="${RUNNER_TEMP}/artifact"
          artifact_name="codex-tip-linux-x86_64-musl"
          mkdir -p "${output_dir}"
          stage_dir="${output_dir}/${artifact_name}"
          mkdir -p "${stage_dir}"
          cp "target/x86_64-unknown-linux-musl/release/codex" "${stage_dir}/codex"
          cat > "${stage_dir}/BUILD_INFO.txt" <<EOF
          ref=${GITHUB_REF_NAME}
          sha=${GITHUB_SHA}
          target=x86_64-unknown-linux-musl
          built_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF
          tar -C "${output_dir}" -czf "${output_dir}/${artifact_name}.tar.gz" "${artifact_name}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: codex-tip-linux-x86_64-musl
          path: ${{ runner.temp }}/artifact/codex-tip-linux-x86_64-musl.tar.gz
          retention-days: 30

  publish:
    name: Publish tip release
    runs-on: ubuntu-24.04
    needs: build
    if: ${{ github.ref_name == 'dev' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download release artifact
        uses: actions/download-artifact@v5
        with:
          name: codex-tip-linux-x86_64-musl
          path: ${{ runner.temp }}/tip-release

      - name: Move tip tag to current commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          git tag -f "${TIP_TAG}" "${GITHUB_SHA}"
          git push origin "refs/tags/${TIP_TAG}" --force

      - name: Create or update tip release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          release_notes="Latest dev tip build for ${GITHUB_SHA} (x86_64-unknown-linux-musl)"
          asset_path="${RUNNER_TEMP}/tip-release/codex-tip-linux-x86_64-musl.tar.gz"

          if gh release view "${TIP_TAG}" >/dev/null 2>&1; then
            mapfile -t existing_assets < <(gh release view "${TIP_TAG}" --json assets --jq '.assets[].name')
            for existing_asset in "${existing_assets[@]}"; do
              gh release delete-asset "${TIP_TAG}" "${existing_asset}" --yes
            done

            gh release edit "${TIP_TAG}" \
              --title "${TIP_RELEASE_NAME}" \
              --notes "${release_notes}" \
              --prerelease
          else
            gh release create "${TIP_TAG}" \
              --title "${TIP_RELEASE_NAME}" \
              --notes "${release_notes}" \
              --prerelease
          fi

          gh release upload "${TIP_TAG}" "${asset_path}" --clobber
