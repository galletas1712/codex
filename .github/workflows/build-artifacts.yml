name: Tip Release

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  TIP_TAG_PREFIX: tip-
  TIP_RELEASE_NAME_PREFIX: Tip

jobs:
  build:
    name: Build Linux tip
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@v6

      - name: Require dev branch
        if: ${{ github.ref_name != 'dev' }}
        shell: bash
        run: |
          echo "Tip Release only publishes builds from dev. Current ref: ${GITHUB_REF_NAME}" >&2
          exit 1

      - name: Install Linux build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev libubsan1

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.14.0

      - name: Install musl build tools
        env:
          DEBIAN_FRONTEND: noninteractive
          TARGET: x86_64-unknown-linux-musl
          APT_UPDATE_ARGS: -o Acquire::Retries=3
          APT_INSTALL_ARGS: --no-install-recommends
        shell: bash
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/install-musl-build-tools.sh"

      - name: Configure musl rusty_v8 artifact overrides
        env:
          TARGET: x86_64-unknown-linux-musl
        shell: bash
        run: |
          set -euo pipefail
          version="$(python3 "${GITHUB_WORKSPACE}/.github/scripts/rusty_v8_bazel.py" resolved-v8-crate-version)"
          release_tag="rusty-v8-v${version}"
          base_url="https://github.com/openai/codex/releases/download/${release_tag}"
          archive="${base_url}/librusty_v8_release_${TARGET}.a.gz"
          binding_dir="${RUNNER_TEMP}/rusty_v8"
          binding_path="${binding_dir}/src_binding_release_${TARGET}.rs"
          mkdir -p "${binding_dir}"
          curl -fsSL "${base_url}/src_binding_release_${TARGET}.rs" -o "${binding_path}"
          echo "RUSTY_V8_ARCHIVE=${archive}" >> "$GITHUB_ENV"
          echo "RUSTY_V8_SRC_BINDING_PATH=${binding_path}" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          targets: x86_64-unknown-linux-musl

      - name: Build codex
        shell: bash
        run: cargo build --release --bin codex --target x86_64-unknown-linux-musl

      - name: Stage artifact
        shell: bash
        run: |
          set -euo pipefail
          output_dir="${RUNNER_TEMP}/artifact"
          short_sha="${GITHUB_SHA::12}"
          artifact_name="codex-tip-${short_sha}-linux-x86_64-musl"
          mkdir -p "${output_dir}"
          stage_dir="${output_dir}/${artifact_name}"
          mkdir -p "${stage_dir}"
          cp "target/x86_64-unknown-linux-musl/release/codex" "${stage_dir}/codex"
          cat > "${stage_dir}/BUILD_INFO.txt" <<EOF
          ref=${GITHUB_REF_NAME}
          sha=${GITHUB_SHA}
          target=x86_64-unknown-linux-musl
          built_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF
          tar -C "${output_dir}" -czf "${output_dir}/${artifact_name}.tar.gz" "${artifact_name}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: tip-release-asset
          path: ${{ runner.temp }}/artifact/*.tar.gz
          retention-days: 30

  publish:
    name: Publish tip release
    runs-on: ubuntu-24.04
    needs: build
    if: ${{ github.ref_name == 'dev' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download release artifact
        uses: actions/download-artifact@v5
        with:
          name: tip-release-asset
          path: ${{ runner.temp }}/tip-release

      - name: Create release tag for this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          release_tag="${TIP_TAG_PREFIX}${GITHUB_SHA}"
          git tag -f "${release_tag}" "${GITHUB_SHA}"
          git push origin "refs/tags/${release_tag}"

      - name: Create or update release for this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          release_tag="${TIP_TAG_PREFIX}${GITHUB_SHA}"
          short_sha="${GITHUB_SHA::12}"
          release_name="${TIP_RELEASE_NAME_PREFIX} ${short_sha}"
          release_notes="Dev tip build for ${GITHUB_SHA} (x86_64-unknown-linux-musl)"
          asset_path="$(find "${RUNNER_TEMP}/tip-release" -type f -name '*.tar.gz' -print -quit)"

          if gh release view tip >/dev/null 2>&1; then
            gh release delete tip --yes --cleanup-tag
          elif git ls-remote --exit-code origin refs/tags/tip >/dev/null 2>&1; then
            git push origin :refs/tags/tip
          fi

          if gh release view "${release_tag}" >/dev/null 2>&1; then
            gh release edit "${release_tag}" \
              --title "${release_name}" \
              --notes "${release_notes}" \
              --prerelease
          else
            gh release create "${release_tag}" \
              --title "${release_name}" \
              --notes "${release_notes}" \
              --prerelease
          fi

          gh release upload "${release_tag}" "${asset_path}" --clobber
