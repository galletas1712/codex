name: Fork Sync

on:
  push:
    branches: [dev]
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  actions: write
  contents: write
  pull-requests: write

env:
  UPSTREAM_REPO: openai/codex
  UPSTREAM_BRANCH: main
  MIRROR_BRANCH: main
  PATCH_BRANCH: dev
  HAS_FORK_SYNC_TOKEN: ${{ secrets.FORK_SYNC_TOKEN != '' && 'true' || 'false' }}
  SYNC_FAILURE_PR_TITLE: Merge main into dev

jobs:
  decide:
    name: Decide Whether To Sync
    runs-on: ubuntu-latest
    outputs:
      should_sync: ${{ steps.decide.outputs.should_sync }}
      reason: ${{ steps.decide.outputs.reason }}
      upstream_sha: ${{ steps.decide.outputs.upstream_sha }}
      mirror_sha: ${{ steps.decide.outputs.mirror_sha }}
    steps:
      - name: Check sync trigger
        id: decide
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" != "schedule" ]]; then
            echo "should_sync=true" >> "$GITHUB_OUTPUT"
            echo "reason=${GITHUB_EVENT_NAME}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          upstream_sha="$(
            git ls-remote "https://github.com/${UPSTREAM_REPO}.git" "refs/heads/${UPSTREAM_BRANCH}" \
              | awk 'NR == 1 { print $1 }'
          )"
          mirror_sha="$(
            git ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" "refs/heads/${MIRROR_BRANCH}" \
              | awk 'NR == 1 { print $1 }'
          )"

          if [[ -z "${upstream_sha}" || -z "${mirror_sha}" ]]; then
            echo "failed to resolve upstream or mirror branch head" >&2
            exit 1
          fi

          echo "upstream_sha=${upstream_sha}" >> "$GITHUB_OUTPUT"
          echo "mirror_sha=${mirror_sha}" >> "$GITHUB_OUTPUT"

          if [[ "${upstream_sha}" == "${mirror_sha}" ]]; then
            echo "should_sync=false" >> "$GITHUB_OUTPUT"
            echo "reason=no-upstream-change" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_sync=true" >> "$GITHUB_OUTPUT"
          echo "reason=upstream-advanced" >> "$GITHUB_OUTPUT"

      - name: Skip scheduled sync when upstream has not changed
        if: ${{ steps.decide.outputs.should_sync != 'true' }}
        shell: bash
        run: |
          echo "Skipping sync: ${REASON}"
          echo "Upstream ${UPSTREAM_REPO}/${UPSTREAM_BRANCH}: ${UPSTREAM_SHA:-unknown}"
          echo "Mirror ${GITHUB_REPOSITORY}/${MIRROR_BRANCH}: ${MIRROR_SHA:-unknown}"
        env:
          REASON: ${{ steps.decide.outputs.reason }}
          UPSTREAM_SHA: ${{ steps.decide.outputs.upstream_sha }}
          MIRROR_SHA: ${{ steps.decide.outputs.mirror_sha }}

  sync:
    name: Sync Fork Branches
    needs: decide
    if: ${{ needs.decide.outputs.should_sync == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.PATCH_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.FORK_SYNC_TOKEN != '' && secrets.FORK_SYNC_TOKEN || github.token }}

      - name: Sync main and merge dev
        id: sync
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          pre_patch_sha="$(git rev-parse "origin/${PATCH_BRANCH}")"
          log_file="${RUNNER_TEMP}/sync-fork-branches.log"
          echo "log_file=${log_file}" >> "$GITHUB_OUTPUT"

          if ./.github/scripts/sync-fork-branches.sh 2>&1 | tee "${log_file}"; then
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
            post_patch_sha="$(git rev-parse "${PATCH_BRANCH}")"

            patch_changed=false
            if [[ "${pre_patch_sha}" != "${post_patch_sha}" ]]; then
              patch_changed=true
            fi

            echo "patch_changed=${patch_changed}" >> "$GITHUB_OUTPUT"
          else
            status=$?
            echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
            exit "${status}"
          fi

      - name: Dispatch CI workflows when push fan-out is unavailable
        if: ${{ always() && steps.sync.outcome == 'success' && env.HAS_FORK_SYNC_TOKEN != 'true' && steps.sync.outputs.patch_changed == 'true' }}
        uses: actions/github-script@v8
        env:
          PATCH_CHANGED: ${{ steps.sync.outputs.patch_changed }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const workflows = [
              "ci.yml",
              "cargo-deny.yml",
              "codespell.yml",
              "rust-ci.yml",
              "bazel.yml",
              "sdk.yml",
              "shell-tool-mcp-ci.yml",
              "build-artifacts.yml",
            ];

            if (process.env.PATCH_CHANGED !== "true") {
              core.info("Patch branch did not change; skipping CI dispatch.");
              return;
            }

            for (const workflow_id of workflows) {
              await github.rest.actions.createWorkflowDispatch({
                owner,
                repo,
                workflow_id,
                ref: process.env.PATCH_BRANCH,
              });
              core.info(`Dispatched ${workflow_id} on ${process.env.PATCH_BRANCH}`);
            }

      - name: Open or update failure PR
        if: ${{ always() && steps.sync.outcome != 'success' }}
        uses: actions/github-script@v8
        env:
          SYNC_FAILURE_PR_TITLE: ${{ env.SYNC_FAILURE_PR_TITLE }}
          MIRROR_BRANCH: ${{ env.MIRROR_BRANCH }}
          PATCH_BRANCH: ${{ env.PATCH_BRANCH }}
          SYNC_LOG_FILE: ${{ steps.sync.outputs.log_file }}
          SYNC_EXIT_CODE: ${{ steps.sync.outputs.exit_code }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");
            const { owner, repo } = context.repo;
            const title = process.env.SYNC_FAILURE_PR_TITLE;
            const logPath = process.env.SYNC_LOG_FILE;
            const exitCode = process.env.SYNC_EXIT_CODE || "unknown";
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const timestamp = new Date().toISOString();
            const head = process.env.MIRROR_BRANCH;
            const base = process.env.PATCH_BRANCH;
            const headRef = `${owner}:${head}`;

            let logExcerpt = "Log file was not captured.";
            if (logPath && fs.existsSync(logPath)) {
              const log = fs.readFileSync(logPath, "utf8");
              logExcerpt = log.length > 30000 ? log.slice(-30000) : log;
            }

            const body = [
              "The fork sync workflow failed and needs a manual merge.",
              "",
              `- Upstream: \`${process.env.UPSTREAM_REPO}\` / \`${process.env.UPSTREAM_BRANCH}\``,
              `- Mirror branch: \`${process.env.MIRROR_BRANCH}\``,
              `- Patch branch: \`${process.env.PATCH_BRANCH}\``,
              `- Exit code: \`${exitCode}\``,
              `- Workflow run: ${runUrl}`,
              `- Updated at: ${timestamp}`,
              "",
              "This PR is managed by the fork sync workflow and will be updated or closed automatically.",
              "",
              "Recent log excerpt:",
              "```text",
              logExcerpt,
              "```",
            ].join("\n");

            const compare = await github.rest.repos.compareCommitsWithBasehead({
              owner,
              repo,
              basehead: `${base}...${head}`,
            });

            const pulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              base,
              head: headRef,
              per_page: 100,
            });

            const existingPull = pulls.find((pull) => pull.title === title) ?? pulls[0];

            if (existingPull) {
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: existingPull.number,
                title,
                body,
              });
              core.info(`Updated PR #${existingPull.number}`);
              return;
            }

            if (compare.data.ahead_by === 0) {
              core.warning(`Unable to open ${head} -> ${base} PR because there are no commits to compare.`);
              return;
            }

            try {
              const created = await github.rest.pulls.create({
                owner,
                repo,
                title,
                head,
                base,
                body,
                draft: true,
              });
              core.info(`Created PR #${created.data.number}`);
            } catch (error) {
              core.setFailed(`Failed to create sync failure PR: ${error.message}`);
            }

      - name: Close failure PR after recovery
        if: ${{ always() && steps.sync.outcome == 'success' }}
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const title = process.env.SYNC_FAILURE_PR_TITLE;
            const head = process.env.MIRROR_BRANCH;
            const base = process.env.PATCH_BRANCH;
            const headRef = `${owner}:${head}`;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;

            const pulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              base,
              head: headRef,
              per_page: 100,
            });

            const existingPull = pulls.find((pull) => pull.title === title) ?? pulls[0];

            if (!existingPull) {
              core.info("No open sync failure PR to close.");
              return;
            }

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: existingPull.number,
              state: "closed",
            });

            core.info(`Closed PR #${existingPull.number}`);
        env:
          SYNC_FAILURE_PR_TITLE: ${{ env.SYNC_FAILURE_PR_TITLE }}
          MIRROR_BRANCH: ${{ env.MIRROR_BRANCH }}
          PATCH_BRANCH: ${{ env.PATCH_BRANCH }}

      - name: Fail workflow if sync failed
        if: ${{ always() && steps.sync.outcome != 'success' }}
        shell: bash
        run: |
          echo "sync-fork-branches failed with exit code ${SYNC_EXIT_CODE:-unknown}" >&2
          exit 1
        env:
          SYNC_EXIT_CODE: ${{ steps.sync.outputs.exit_code }}
